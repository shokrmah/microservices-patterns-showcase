# This pipeline runs automatically when you push changes to anything
# inside the services/api-gateway/ folder on the main branch.
# It does three things: lint check, build Docker image, push to GHCR.

name: API Gateway CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'services/api-gateway/**'  # only triggers when this service changes
  pull_request:
    branches:
      - main
    paths:
      - 'services/api-gateway/**'

env:
  # GHCR image name format: ghcr.io/YOUR_GITHUB_USERNAME/IMAGE_NAME
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/api-gateway

jobs:

  # -------------------------------------------------------
  # JOB 1: Test
  # Runs on every push and pull request.
  # Currently just verifies the app starts without crashing.
  # We will add real tests here later.
  # -------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest  # GitHub provides this VM for free

    steps:
      # Step 1: Check out your code onto the VM
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Node.js on the VM
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/api-gateway/package-lock.json

      # Step 3: Install dependencies
      - name: Install dependencies
        working-directory: services/api-gateway
        run: npm install

      # Step 4: Verify the app loads without errors
      # We import app.js directly — if it crashes on load the pipeline fails
      - name: Verify app loads
        working-directory: services/api-gateway
        run: node -e "require('./src/app.js'); console.log('App loaded successfully');"

  # -------------------------------------------------------
  # JOB 2: Build and Push Docker image
  # Only runs on push to main (not on pull requests).
  # Waits for the test job to pass first.
  # -------------------------------------------------------
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test  # this job only starts if the test job passed

    # Skip this job on pull requests — we only push images from main
    if: github.event_name == 'push'

    steps:
      # Step 1: Check out code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log in to GitHub Container Registry (GHCR)
      # CR_PAT is the secret you added in Step 2 above
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      # Step 3: Extract metadata for the image tag.
      # This automatically tags the image with:
      # - the git commit SHA (e.g. ghcr.io/you/api-gateway:abc1234)
      # - "latest" on every main branch push
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # Step 4: Build the Docker image and push it to GHCR
      # Uses the Dockerfile inside services/api-gateway/
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/api-gateway  # folder containing the Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}